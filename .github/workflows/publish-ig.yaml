name: Publish Implementation Guide (Auto)

on:
  push:
    branches:
      - main
      - main-V1
      - uat
      - uat-V1

jobs:
  publish-ig:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set branch name
        id: set_branch
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Print branch
        run: echo "Running on branch ${{ env.BRANCH_NAME }}"

      - name: Send POST request
        run: |
          # main and main-V1 are subtly different https (main), http (main-V1) - to make the url unique
          if [[ "${{ env.BRANCH_NAME }}" == "main" ]]; then
            curl \
              --fail-with-body \
              --show-error \
              --silent \
              --location \
              -X POST "https://fhir-ig-builder.api.digital.health.nz/v1/build" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${{ secrets.API_KEY }}" \
              -d '{"gitBranch": "${{ env.BRANCH_NAME }}", "igSourceGitUrl": "https://github.com/tewhatuora/air-fhir-ig.git"}'
          elif [[ "${{ env.BRANCH_NAME }}" == "main-V1"  ]]; then 
            curl \
              --fail-with-body \
              --show-error \
              --silent \
              --location \
              -X POST "https://fhir-ig-builder.api.digital.health.nz/v1/build" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${{ secrets.API_KEY }}" \
              -d '{"gitBranch": "${{ env.BRANCH_NAME }}", "igSourceGitUrl": "http://github.com/tewhatuora/air-fhir-ig.git"}'
          elif  [[ "${{ env.BRANCH_NAME }}" == "uat"  ]]; then  
            curl \
              --fail-with-body \
              --show-error \
              --silent \
              --location \
              -X POST "https://fhir-ig-builder.api-uat.digital.health.nz/v1/build" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${{ secrets.API_KEY_UAT }}" \
              -d '{"gitBranch": "${{ env.BRANCH_NAME }}", "igSourceGitUrl": "https://github.com/tewhatuora/air-fhir-ig.git"}'
          elif  [[ "${{ env.BRANCH_NAME }}" == "uat-V1"  ]]; then  
            curl \
              --fail-with-body \
              --show-error \
              --silent \
              --location \
              -X POST "https://fhir-ig-builder.api-uat.digital.health.nz/v1/build" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${{ secrets.API_KEY_UAT }}" \
              -d '{"gitBranch": "${{ env.BRANCH_NAME }}", "igSourceGitUrl": "http://github.com/tewhatuora/air-fhir-ig.git"}'
          else 
            echo "Logic error ${{ env.BRANCH_NAME }} execution path not found?"
            exit 5
          fi
