      name: x-api-key
      in: header
      description: api-key
      required: true
      schema:
        type: string
    request-context:
      name: request-context
      in: header
      description: Base64 encoded context information
      required: true
      schema:
        type: string
      example: ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/
