openapi: 3.0.4
info:
  title: AIR ImmSoT API
  description: "This API provides the ability to create, modify and retrieve Immunisation records from AIR ImmSoT database for approved external system-to-system clients."
  version: "2.1.0"
servers:
  - url: https://api.air.digital.health.nz/s2s/fhir/R4
    description: PROD - External system-to-system endpoint for version 1
  - url: https://api.air.digital.health.nz/s2s/fhir/R4/v2
    description: PROD - External system-to-system endpoint for version 2
paths:
  /fhir/R4/Immunization:
    post:
      operationId: create
      description: |
        The "create" operation is used to create a new immunisation event. This method performs validation checks to ensure that the event is valid before it is created.
        Returns either the created Immunization record or if there were any issues with the create, the response will contain an OperationOutcome resource array. The OperationOutcome resource has an informational issue indicating that the create operation failed. The issue array of the OperationOutcome resource would contain additional issues with appropriate severity and code values.
      parameters:
        - $ref: '#/components/parameters/X-Correlation-ID'
        - $ref: '#/components/parameters/X-Api-Key'
        - $ref: '#/components/parameters/request-context'
      requestBody:
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/AirImmunization'
            examples:
              createExample:
                $ref: '#/components/examples/CreatePayload'
      responses:
        "201":
          $ref: '#/components/responses/201'
        "422":
          $ref: '#/components/responses/422'
        "403":
          description: Forbidden
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
        "429":
          $ref: '#/components/responses/429'
        "500":
          $ref: '#/components/responses/500'
      security:
        - OAuth2Implicit:
            - system/Immunization.c
  /fhir/R4/Immunization/{ID}:
    get:
      operationId: read
      description: |
        The "read" operation is used to read an immunisation event. This method takes an immunisation event id and returns back the FHIR resource for the immunization event.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/X-Correlation-ID'
        - $ref: '#/components/parameters/X-Api-Key'
        - $ref: '#/components/parameters/request-context'
      responses:
        "200":
          description: Ok
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OrchestrationImmunizationBundle'
              examples:
                ImmsEventRecord:
                  $ref: '#/components/examples/OrchestrationResult'
        "400":
          $ref: '#/components/responses/400'
        "403":
          $ref: '#/components/responses/403'
        "404":
          $ref: '#/components/responses/404'
        "429":
          $ref: '#/components/responses/429'
        "500":
          $ref: '#/components/responses/500'
      security:
        - OAuth2Implicit:
            - system/Immunization.r
    put:
      operationId: update
      description: |
        The "update" operation is used to update an existing immunisation event. This method checks if the immunisation event with the given ID exists, and if it does, it updates the event with the new details provided. The method also performs validation checks to ensure that the updated event is valid before it is saved.
        Returns either the the updated immunisation record or an OperationOutcome if there were any issues with the update.
        On success - returns the updated immunisation record. data quality issues will be identified and sent as part of the response in the meta section of the resource.
        On Fail - if there were any issues with the update, the response will contain an OperationOutcome resource array. The OperationOutcome resource has an informational issue indicating that the update operation failed. The issue array of the OperationOutcome resource would contain additional issues with appropriate severity and code values.
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/X-Correlation-ID'
        - $ref: '#/components/parameters/If-Match'
        - $ref: '#/components/parameters/X-Api-Key'
        - $ref: '#/components/parameters/request-context'
      requestBody:
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/AirImmunization'
            examples:
              updateExample:
                $ref: '#/components/examples/UpdatePayload'
              UpdateDQIgnore:
                $ref: '#/components/examples/UpdateDQIgnore'
      responses:
        "200":
          $ref: '#/components/responses/200'
        "422":
          $ref: '#/components/responses/422'
        "400":
          $ref: '#/components/responses/400'
        "401":
          $ref: '#/components/responses/401'
        "403":
          $ref: '#/components/responses/403'
        "500":
          $ref: '#/components/responses/500'
      security:
        - OAuth2Implicit:
            - system/Immunization.u
  /fhir/R4/Immunization/_search:
    post:
      operationId: search
      description: "Search Immunisation records using the external standard search contract. Supported parameters are patient, target-disease, status-reason:not-in, status:not-in, status, _include, organisation and location. Clients may search by NHI value or full Patient reference. Supported scenarios include POST _search with query parameters and no body, POST _search with application/x-www-form-urlencoded body containing patient=ZKN2155, and POST _search with application/x-www-form-urlencoded body containing patient=https://api.hip.digital.health.nz/fhir/nhi/v1/Patient/ZKN2155. JSON request bodies and admin data-quality search parameters are not supported in the marketplace specification."
      parameters:
        - $ref: '#/components/parameters/X-Correlation-ID'
        - $ref: '#/components/parameters/X-Api-Key'
        - $ref: '#/components/parameters/request-context'
        - name: patient
          in: query
          required: false
          description: Patient identifier or full Patient reference. Supported values include ZKN2155 and https://api.hip.digital.health.nz/fhir/nhi/v1/Patient/ZKN2155. A full Patient reference is processed as a FHIR reference search against Immunization.patient.reference.
          schema:
            type: string
          examples:
            nhi:
              value: ZKN2155
              summary: NHI identifier
            fullReference:
              value: https://api.hip.digital.health.nz/fhir/nhi/v1/Patient/ZKN2155
              summary: Full Patient reference
        - name: target-disease
          in: query
          required: false
          explode: false
          schema:
            type: array
            maxItems: 1000
            items:
              type: string
          description: Used in standard search only. Restrict to specific target disease(s) by system|code
          example: http://snomed.info/sct|123456,http://loinc.org|7890.
        - name: status-reason:not-in
          in: query
          required: false
          explode: false
          schema:
            type: array
            maxItems: 1000
            items:
              type: string
          description: Used in standard search only. Exclude given status_reason(s) by system|code
          example: https://standards.digital.health.nz/ns/air-status-reason-terms|CPI,https://standards.digital.health.nz/ns/air-status-reason-terms|RESCHO
        - name: status:not-in
          in: query
          required: false
          explode: false
          schema:
            type: array
            maxItems: 1000
            items:
              type: string
              enum:
                - entered-in-error
                - completed
                - not-done
          description: Used in standard search only. Exclude given status(s) [entered-in-error, completed, not-done]
          example: entered-in-error,completed
        - name: status
          in: query
          required: false
          explode: false
          schema:
            type: array
            maxItems: 1000
            items:
              type: string
              enum:
                - entered-in-error
                - completed
                - not-done
          description: Used in standard search only. Include only given status(s) [entered-in-error, completed, not-done]
          example: entered-in-error,completed
        - name: _include
          in: query
          explode: true
          description: To include the enrichment of the resources namely Patient, Organization, Practitioner & Location
          schema:
            type: string
          example: Patient
        - name: organisation
          in: query
          required: false
          description: Restrict results to immunisation events associated with the given organisation identifier or reference.
          schema:
            type: string
        - name: location
          in: query
          required: false
          description: Restrict results to immunisation events associated with the given location or facility identifier/reference.
          schema:
            type: string
      requestBody:
        required: false
        description: Optional form body for standard search parameters. Do not send JSON for _search.
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                patient:
                  type: string
                  description: NHI value or full Patient reference.
                target-disease:
                  type: string
                  description: Target disease in system|code format.
                status-reason:not-in:
                  type: string
                  description: Comma-separated status reason exclusions.
                status:not-in:
                  type: string
                  description: Comma-separated status exclusions.
                status:
                  type: string
                  description: Comma-separated statuses to include.
                _include:
                  type: string
                  description: Included resource enrichment.
                organisation:
                  type: string
                  description: Organisation identifier or reference.
                location:
                  type: string
                  description: Location/facility identifier or reference.
            examples:
              Search by NHI number:
                $ref: '#/components/examples/SearchNhi'
              Search by full Patient reference:
                $ref: '#/components/examples/SearchNhiFullReference'
      responses:
        "200":
          description: Ok
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OrchestrationImmunizationBundle'
              examples:
                Multiple records returned:
                  $ref: '#/components/examples/OrchestrationResult'
                No records found for NHI:
                  $ref: '#/components/examples/SearchNoMatch'
        "400":
          $ref: '#/components/responses/400'
        "403":
          $ref: '#/components/responses/403'
        "401":
          $ref: '#/components/responses/401'
        "429":
          $ref: '#/components/responses/429'
        "500":
          $ref: '#/components/responses/500'
      security:
        - OAuth2Implicit:
            - system/Immunization.s
  /fhir/R4/Immunization/$upsert:
    post:
      operationId: $upsert
      description: |
        Perform an upsert using a deterministic matching algorithm.
        The algorithm attempts to resolve exactly one existing Immunisation Event.
        If a single match is found, the event is updated. If no match is found, or if multiple candidate matches are detected, a new Immunisation Event is inserted.
        Immunisation Event in the request attempt to find a matching existing Immunisation Event that matches on NHI, Occurrence Date, Vaccine Code and Indication
        1. If no match found, create a new event
        2. If single match found, update the matched event
        3. If multiple events found, create a new event (duplicate Data Quality violation will be raised).
        4. Failure to process the event, reject the request
      parameters:
        - $ref: '#/components/parameters/X-Correlation-ID'
        - $ref: '#/components/parameters/X-Api-Key'
        - $ref: '#/components/parameters/request-context'
      requestBody:
        description: |
          Perform an upsert using a deterministic matching algorithm.
          The algorithm attempts to resolve exactly one existing Immunisation Event.
          If a single match is found, the event is updated. If no match is found, or if multiple candidate matches are detected, a new Immunisation Event is inserted.
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/AirImmunization'
            examples:
              upsertExample:
                $ref: '#/components/examples/CreatePayload'
      responses:
        "200":
          description: Ok
          $ref: '#/components/responses/200'
        "400":
          $ref: '#/components/responses/400'
        "403":
          $ref: '#/components/responses/403'
        "429":
          $ref: '#/components/responses/429'
        "500":
          $ref: '#/components/responses/500'
      security:
        - OAuth2Implicit:
            - system/Immunization.c
            - system/Immunization.u
components:
  schemas:
    Address:
      type: object
      properties:
        extension:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/ExtensionString"
        use:
          type: string
          enum:
            - home
            - work
        type:
          type: string
          enum:
            - postal
            - physical
        line:
          type: array
          maxItems: 1000
          items:
            type: string
        city:
          type: string
        postalCode:
          type: string
    AirImmunization:
      type: object
      properties:
        resourceType:
          type: string
        id:
          description: 'The ImmSOT record ID for the Immunisation Event'
          type: string
        meta:
          type: object
          properties:
            extension:
              $ref: '#/components/schemas/DQExtension'
            versionId:
              description: 'The version number of the Immunisation Event in Immsot'
              type: string
            lastUpdated:
              type: string
            profile:
              description: 'The AIR FHIR profile against which the Immunisation Service is validated'
              type: array
              maxItems: 1000
              items:
                type: string
        patient:
          $ref: '#/components/schemas/LogicalReference'
        vaccineCode:
          $ref: '#/components/schemas/CodeableConcept'
        occurrenceDateTime:
          type: string
        protocolApplied:
          type: array
          maxItems: 1000
          items:
            type: object
            properties:
              doseNumberPositiveInt:
                description: 'Dose Number. If provided in the request, it will be retained in the response. If not provided(null), it defaults to 98'
                type: integer
        lotNumber:
          type: string
        expirationDate:
          type: string
        contained:
          $ref: "#/components/schemas/Contained"
        extension:
          $ref: '#/components/schemas/AirExtension'
        route:
          $ref: '#/components/schemas/CodeableConcept'
        site:
          $ref: '#/components/schemas/CodeableConcept'
        location:
          type: object
          properties:
            reference:
              type: string
            identifier:
              type: object
              properties:
                system:
                  type: string
                value:
                  type: string
        status:
          type: string
        statusReason:
          $ref: '#/components/schemas/CodeableConcept'
        reasonCode:
          $ref: '#/components/schemas/CodeableConceptArray'
        performer:
          type: array
          maxItems: 1000
          items:
            type: object
            properties:
              actor:
                type: object
                properties:
                  identifier:
                    type: object
                    properties:
                      system:
                        type: string
                      value:
                        type: string
                      assigner:
                        type: object
                        properties:
                          display:
                            type: string
              function:
                $ref: '#/components/schemas/CodeableConcept'
    AirImmunizationBundle:
      type: object
      properties:
        resourceType:
          type: string
        id:
          type: string
        meta:
          type: object
          properties:
            lastUpdated:
              type: string
        type:
          type: string
        total:
          type: integer
        entry:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/AirImmunization'
    ContactPoint:
      type: object
      properties:
        system:
          enum:
            - phone
            - email
          type: string
        value:
          type: string
        use:
          enum:
            - home
            - work
          type: string
    Contained:
      type: array
      maxItems: 1000
      items:
        anyOf:
          - $ref: "#/components/schemas/RelatedPerson"
          - $ref: "#/components/schemas/Observation"
    AirExtension:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          url:
            type: string
            example: "https://standards.digital.health.nz/fhir/air/StructureDefinition/air-diluent"
          valueReference:
            type: object
            properties:
              reference:
                type: string
          valueCodeableConcept:
            $ref: "#/components/schemas/CodeableConcept"
          extension:
            type: array
            maxItems: 1000
            items:
              anyOf:
                - $ref: '#/components/schemas/ExtensionString'
                - $ref: '#/components/schemas/ExtensionDate'
                - $ref: '#/components/schemas/ExtensionInteger'
    Identifier:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          use:
            type: string
          system:
            type: string
          value:
            type: string
    Link:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          other:
            type: object
            properties:
              reference:
                type: string
          type:
            type: string
    DQExtension:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          url:
            type: string
            example: "https://standards.digital.health.nz/fhir/air/StructureDefinition/air-data-quality-assessment"
          valueString:
            type: string
          extension:
            type: array
            maxItems: 1000
            items:
              anyOf:
                - $ref: '#/components/schemas/ExtensionString'
                - $ref: '#/components/schemas/ExtensionInteger'
                - $ref: '#/components/schemas/ExtensionDateTime'
                - $ref: '#/components/schemas/ExtensionBoolean'
                - $ref: '#/components/schemas/ViolationsExtension'
    ExtensionBoolean:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          url:
            type: string
          valueBoolean:
            type: boolean
    ExtensionDate:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          url:
            type: string
          valueDate:
            type: string
            format: date
    ExtensionDateTime:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          url:
            type: string
          valueDateTime:
            type: string
    ExtensionInteger:
      type: object
      properties:
        url:
          type: string
        valueInteger:
          type: integer
    ExtensionString:
      type: object
      properties:
        url:
          type: string
        valueString:
          type: string
    LogicalReference:
      type: object
      properties:
        reference:
          type: string
          example: https://api.hip.digital.health.nz/fhir/nhi/v1/Patient/ZZZ7541
        identifier:
          type: object
          properties:
            system:
              type: string
              example: https://standards.digital.health.nz/ns/nhi-id
            value:
              type: string
              example: ZZZ7541
    OperationOutcome:
      type: object
      properties:
        resourceType:
          type: string
        id:
          type: string
        text:
          type: object
          properties:
            status:
              type: string
              enum:
                - generated
                - empty
            div:
              type: string
        issue:
          type: array
          maxItems: 1000
          items:
            type: object
            properties:
              severity:
                type: string
              code:
                type: string
              diagnostics:
                type: string
              details:
                type: object
                properties:
                  coding:
                    type: array
                    maxItems: 1000
                    items:
                      type: object
                      properties:
                        system:
                          type: string
                        code:
                          type: string
                          enum:
                            - AA
                            - AE
              expression:
                type: array
                maxItems: 1000
                items:
                  type: string
    RelatedPerson:
      type: object
      properties:
        resourceType:
          type: string
        id:
          type: string
        patient:
          $ref: "#/components/schemas/LogicalReference"
        relationship:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/CodeableConcept"
        name:
          type: array
          maxItems: 1000
          items:
            type: object
            properties:
              family:
                type: string
              given:
                type: array
                maxItems: 1000
                items:
                  type: string
        telecom:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/ContactPoint"
        address:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/Address"
    Observation:
      type: object
      properties:
        resourceType:
          type: string
        id:
          type: string
        meta:
          type: object
          properties:
            profile:
              type: array
              maxItems: 1000
              items:
                type: string
        status:
          type: string
        code:
          $ref: "#/components/schemas/CodeableConcept"
        interpretation:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/CodeableConcept"
        effectiveDateTime:
          type: string
    ViolationExtension:
      type: object
      properties:
        url:
          type: string
          example: DQViolation
        extension:
          type: array
          maxItems: 1000
          items:
            allOf:
              - $ref: '#/components/schemas/ExtensionString'
              - $ref: '#/components/schemas/ExtensionInteger'
    ViolationsExtension:
      type: object
      properties:
        url:
          type: string
          example: DQViolations
        extension:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/ViolationExtension'
    OrchestrationPatient:
      type: object
      properties:
        resourceType:
          type: string
        id:
          type: string
        meta:
          type: object
          properties:
            versionId:
              type: string
            profile:
              type: array
              maxItems: 1000
              items:
                type: string
        extension:
          $ref: '#/components/schemas/OrchesExtensionCable'
        gender:
          type: string
        birthDate:
          type: string
        _birthDate:
          type: object
          properties:
            extension:
              $ref: '#/components/schemas/BirthDateExtension'
        address:
          $ref: '#/components/schemas/OrchesPatientAddress'
    OrchesExtensionCable:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          url:
            type: string
          valueCodeableConcept:
            type: object
            properties:
              coding:
                type: array
                maxItems: 1000
                items:
                  type: object
                  properties:
                    system:
                      type: string
                    version:
                      type: string
                    code:
                      type: string
                    display:
                      type: string
    BirthDateExtension:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          url:
            type: string
          valueCodeableConcept:
            type: object
            properties:
              coding:
                type: array
                maxItems: 1000
                items:
                  type: object
                  properties:
                    system:
                      type: string
                    version:
                      type: string
                    code:
                      type: string
                    display:
                      type: string
    OrchesPatientAddress:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          id:
            type: string
          extension:
            type: array
            maxItems: 1000
            items:
              type: object
              properties:
                url:
                  type: string
                valueCodeableConcept:
                  type: object
                  properties:
                    coding:
                      type: array
                      maxItems: 1000
                      items:
                        type: object
                        properties:
                          system:
                            type: string
                          version:
                            type: string
                          code:
                            type: string
                          display:
                            type: string
          use:
            type: string
          type:
            type: string
          line:
            type: array
            maxItems: 1000
            items:
              type: string
          city:
            type: string
          postalCode:
            type: string
    OrchestrationLocation:
      type: object
      properties:
        resourceType:
          type: string
        id:
          type: string
        meta:
          type: object
          properties:
            versionId:
              type: string
            lastUpdated:
              type: string
            profile:
              type: array
              maxItems: 1000
              items:
                type: string
        extension:
          type: array
          maxItems: 1000
          items:
            type: object
            properties:
              url:
                type: string
              valuePeriod:
                type: object
                properties:
                  start:
                    type: string
        identifier:
          type: array
          maxItems: 1000
          items:
            type: object
            properties:
              use:
                type: string
              system:
                type: string
              value:
                type: string
              assigner:
                type: object
                properties:
                  reference:
                    type: string
        status:
          type: string
        name:
          type: string
        alias:
          type: array
          maxItems: 1000
          items:
            type: string
        _alias:
          $ref: '#/components/schemas/OrchesLocationAlias'
        type:
          $ref: '#/components/schemas/OrchesLocationType'
        telecom:
          $ref: '#/components/schemas/OrchesTelecom'
        address:
          type: object
          properties:
            extension:
              type: array
              maxItems: 1000
              items:
                type: object
                properties:
                  url:
                    type: string
                  valueString:
                    type: string
            use:
              type: string
            type:
              type: string
            text:
              type: string
            line:
              type: array
              maxItems: 1000
              items:
                type: string
        managingOrganization:
          type: object
          properties:
            reference:
              type: string
            display:
              type: string
    OrchesLocationAlias:
      type: array
      maxItems: 1000
      items:
        type: object
        properties:
          extension:
            type: array
            maxItems: 1000
            items:
              type: object
              properties:
                url:
                  type: string
                valueCodeableConcept:
                  type: object
                  properties:
                    coding:
                      type: array
                      maxItems: 1000
                      items:
