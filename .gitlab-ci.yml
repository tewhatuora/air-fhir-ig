default:
  tags:
    - azure

image: registry.gitlab.com/healthnz-prm/air/air-api-orca/orca:0.6

stages:
  - build-prepare
  - build
  - generate-openapi        # ADDED: new stage - runs after build so SUSHI output exists
  - release
  - build-pages
  - deploy
  - post-release

variables:
  RELEASE:
    value: "false"
    description: "Set to true in order to build a new release."
  RELEASE_MAJOR:
    value: "false"
    description: "If true then a major release will be built. Only applies if RELEASE=true and the release is made from the main branch."
  API_VERSION: "v2"
  PUBLISH_SCRIPTS_GIT_REPO: "air-api-fhir-ig-v2"
  CI_DEBUG_TRACE: "true"
  # ADDED: path constants so every job refers to the same locations
  FSH_CAPABILITY_STATEMENT: "input/fsh/capabilitystatement.fsh"
  OPENAPI_OUTPUT_DIR: "openapi"

ig-build-prepare:
  stage: build-prepare
  rules:
    - if: $CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME =~ /^release\/.+/
  script:
    - ./ci-scripts/pre-build.sh
  artifacts:
    paths:
      - sushi-config.yaml
    reports:
      dotenv: version.env
    expire_in: 1 week

build-ig:
  stage: build
  variables:
    KUBERNETES_CPU_REQUEST: "2"
    KUBERNETES_CPU_LIMIT: "4"
    KUBERNETES_MEMORY_REQUEST: "4G"
    KUBERNETES_MEMORY_LIMIT: "4G"
  script:
    - ./_updatePublisher.sh -y
    - ./build-ig.sh
    - ./transform_to_marketplace_spec.sh
  artifacts:
    paths:
      - output
      - sushi-config.yaml
      # ADDED: pass the FSH source through to the next stage
      - input/fsh/capabilitystatement.fsh
    expire_in: 1 week

# ─── ADDED: generate and validate OpenAPI spec from capabilitystatement.fsh ───
generate-openapi-spec:
  stage: generate-openapi
  # Use a plain node image - the orca image may not have node, and this job
  # does not need the full FHIR toolchain.
  image: node:20-alpine
  needs:
    - job: build-ig
      artifacts: true   # pulls output/ and capabilitystatement.fsh from build-ig
  before_script:
    - cd localscripts
    - npm ci --silent    # installs from package-lock.json, faster and reproducible
    - cd ..
  script:
    # 1. Generate YAML
    - |
      node localscripts/generate-openapi.js \
        --input  "$FSH_CAPABILITY_STATEMENT" \
        --output "$OPENAPI_OUTPUT_DIR/air-immsot-api.yaml" \
        --format yaml

    # 2. Generate JSON
    - |
      node localscripts/generate-openapi.js \
        --input  "$FSH_CAPABILITY_STATEMENT" \
        --output "$OPENAPI_OUTPUT_DIR/air-immsot-api.json" \
        --format json

    # 3. Validate the generated YAML with swagger-cli
    #    npx avoids adding swagger-cli as a permanent dependency
    - |
      npx --yes @apidevtools/swagger-cli@4 validate \
        "$OPENAPI_OUTPUT_DIR/air-immsot-api.yaml"

    # 4. Version drift check - fail if FSH version != generated YAML version
    - |
      FSH_VER=$(grep '^\* version' "$FSH_CAPABILITY_STATEMENT" \
                | head -1 \
                | sed 's/.*"\(.*\)".*/\1/')

      YAML_VER=$(node -e "
        const y = require('./localscripts/node_modules/js-yaml');
        const f = require('fs');
        const doc = y.load(f.readFileSync('$OPENAPI_OUTPUT_DIR/air-immsot-api.yaml','utf8'));
        console.log(doc.info.version);
      ")

      echo "FSH version : $FSH_VER"
      echo "YAML version: $YAML_VER"

      if [ "$FSH_VER" != "$YAML_VER" ]; then
        echo "ERROR: version mismatch - re-run the generator after bumping the FSH version"
        exit 1
      fi

      echo "OK: versions match ($FSH_VER)"

  artifacts:
    # Expose the generated specs to all downstream jobs (release, pages, deploy)
    paths:
      - openapi/air-immsot-api.yaml
      - openapi/air-immsot-api.json
    expire_in: 1 week
# ─── END ADDED ────────────────────────────────────────────────────────────────

ig-release:
  stage: release
  rules:
    - if: $RELEASE == "true"
  # CHANGED: added needs so release waits for openapi generation to succeed
  needs:
    - job: generate-openapi-spec
      artifacts: true
    - job: ig-build-prepare
      artifacts: true
  script:
    - set -euxo pipefail
    - ./ci-scripts/create-release.sh

build-web-pages-archive:
  image: alpine:latest
  stage: build-pages
  rules:
    - if: $RELEASE == "true"
  # CHANGED: added needs so the zip includes the generated openapi specs
  needs:
    - job: generate-openapi-spec
      artifacts: true
    - job: build-ig
      artifacts: true
  before_script:
    - apk add zip curl yq
  script:
    # CHANGED: copy openapi specs into output/ before zipping so they
    # are included in the published web-pages archive
    - mkdir -p output/openapi
    - cp openapi/air-immsot-api.yaml output/openapi/
    - cp openapi/air-immsot-api.json output/openapi/
    - (cd output; zip -r "../web-pages.zip" .)
    - PUBLISH_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${API_VERSION}/${MVN_IG_VERSION}/web-pages.zip"
    - echo "Uploading ${PUBLISH_URL}"
    - >
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file web-pages.zip "${PUBLISH_URL}"
  artifacts:
    name: "${CI_COMMIT_REF_NAME}-web-pages"
    paths:
      - web-pages.zip
    expire_in: 1 month

mvn-deploy-package:
  image: maven:3-amazoncorretto-17
  stage: deploy
  rules:
    - if: $CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME =~ /^release\/.+/
  # CHANGED: added needs so maven deploy also waits for openapi
  needs:
    - job: generate-openapi-spec
      artifacts: true
    - job: build-ig
      artifacts: true
  cache:
    paths:
      - .m2/repository
  script:
    - mvn deploy:deploy-file -s ci_settings.xml -Dfile=output/package.tgz -DrepositoryId=gitlab-maven -Durl=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/maven -DgroupId=nz.health.air.immsot -DartifactId=air-api-fhir-ig -Dversion=$MVN_IG_VERSION -Dpackaging=tgz

pages:
  image: alpine:latest
  stage: deploy
  rules:
    - if: $CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME =~ /^release\/.+/
  # CHANGED: added needs so pages also waits for openapi
  needs:
    - job: generate-openapi-spec
      artifacts: true
    - job: build-ig
      artifacts: true
  before_script:
    - apk add curl unzip yq git
  script:
    - rm -rf publish_scripts_tmp public
    - git clone --depth 1 https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/healthnz-prm/air/${PUBLISH_SCRIPTS_GIT_REPO}.git publish_scripts_tmp
    - (cd publish_scripts_tmp; sh ./ci-scripts/publish-website.sh)
    - ls publish_scripts_tmp
    - ls
  artifacts:
    paths:
      - public

ig-post-release:
  stage: post-release
  rules:
    - if: $RELEASE == "true"
  script:
    - ./ci-scripts/post-release.sh